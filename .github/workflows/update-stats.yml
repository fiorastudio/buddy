name: Update Stats Monitor

on:
  schedule:
    - cron: '0 0 * * *' # Daily at 00:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch and Update Stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATS_FILE=".github/stats/clone-history.json"
          
          # 1. Load existing stats or initialize
          if [ -f "$STATS_FILE" ]; then
            BASELINE_UNIQUES=$(jq -r '.baselineUniques // 0' "$STATS_FILE")
            DAILY_COUNTS=$(jq -c '.dailyCounts // {}' "$STATS_FILE")
          else
            BASELINE_UNIQUES=0
            DAILY_COUNTS="{}"
            mkdir -p .github/stats
          fi

          # 2. Fetch traffic data from GitHub API
          # The clones endpoint returns the last 14 days of data.
          TRAFFIC_DATA=$(gh api repos/${{ github.repository }}/traffic/clones)
          
          # 3. Merge new data into dailyCounts using jq
          # We extract the 'clones' array, and for each entry, we update the dailyCounts object.
          # Note: clones array has objects like {"timestamp": "2024-03-27T00:00:00Z", "count": 10, "uniques": 5}
          # We convert timestamp to YYYY-MM-DD.
          NEW_DAILY_COUNTS=$(echo "$TRAFFIC_DATA" | jq -c --argjson existing "$DAILY_COUNTS" '
            .clones | reduce .[] as $item ($existing; 
              .[$item.timestamp[0:10]] = $item.uniques
            )
          ')

          # 4. Recalculate totalUniques (Baseline + Sum of Daily Counts)
          # Use // 0 to handle cases where DAILY_COUNTS might be empty/null to avoid jq crash.
          DAILY_SUM=$(echo "$NEW_DAILY_COUNTS" | jq '[.[]] | add // 0')
          NEW_TOTAL_UNIQUES=$((BASELINE_UNIQUES + DAILY_SUM))

          # 5. Update the JSON file
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n \
            --arg baseline "$BASELINE_UNIQUES" \
            --arg total "$NEW_TOTAL_UNIQUES" \
            --arg time "$TIMESTAMP" \
            --argjson daily "$NEW_DAILY_COUNTS" \
            '{baselineUniques: ($baseline | tonumber), totalUniques: ($total | tonumber), lastUpdated: $time, dailyCounts: $daily}' \
            > "$STATS_FILE"

          echo "Updated totalUniques: $NEW_TOTAL_UNIQUES"

          # 6. Update README.md with the new total
          # Update the "Buddies Rescued & Hatched" line and badge
          FORMATTED_TOTAL=$(printf "%'d" $NEW_TOTAL_UNIQUES)
          RESCUED_TEXT="${FORMATTED_TOTAL}+"

          # Update the bold stats line
          sed -i "s/\*\*🐾 [0-9,]*+ Buddies Rescued & Hatched · Our terminal companions are finally coming home\.\*\*/\*\*🐾 ${RESCUED_TEXT} Buddies Rescued \& Hatched · Our terminal companions are finally coming home.\*\*/" README.md
          
          # Update the live badge
          sed -i "s|!\[Buddies Rescued\](https://img.shields.io/badge/buddies_rescued-[0-9,]*+-green?style=flat-square&logo=gitlfs)|!\[Buddies Rescued\](https://img.shields.io/badge/buddies_rescued-${RESCUED_TEXT}-green?style=flat-square\&logo=gitlfs)|" README.md

          # Update the tagline in the middle of README if it exists
          # Looking for: **🚀 2,500+ clones · 900+ buddies saved or hatched · 1 week in the wild**
          # We don't have a reliable way to get total clones from this specific API (it only gives 14 days),
          # but we can at least update the rescued count there too if it matches a pattern.
          sed -i "s/[0-9,]*+ buddies saved or hatched/${RESCUED_TEXT} buddies saved or hatched/" README.md

          # 7. Commit and push changes
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md "$STATS_FILE"
          
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: update buddies rescued stats to $RESCUED_TEXT [skip ci]"
            # Use the default branch for pushing or the explicit branch if preferred
            git push origin HEAD:${{ github.event.repository.default_branch }} || git push origin HEAD:master
          else
            echo "No changes to commit."
          fi
